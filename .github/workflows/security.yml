name: Secret Scan Pipeline

on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get your code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Run GitLeaks (file-based scan - FIXED)
      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --no-git --verbose --exit-code 1