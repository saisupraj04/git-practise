name: Secret Scan Pipeline

on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Show files (debug)
      - name: List files
        run: |
          echo "Files in repo:"
          ls -R

      # Step 3: Show app.py content (debug)
      - name: Show app.py content
        run: cat app.py

      # Step 4: Install GitLeaks manually
      - name: Install GitLeaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/

      # Step 5: Run GitLeaks (FORCE FILE SCAN)
      - name: Run GitLeaks
        run: |
          gitleaks detect --source . --no-git --verbose --exit-code 1