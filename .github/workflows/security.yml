name: Full Repo Secret Scan

on:
  push:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Debug - list all files
      - name: List all files
        run: |
          echo "===== FILE STRUCTURE ====="
          ls -R

      # Step 3: Show all file contents (optional debug)
      - name: Show important files
        run: |
          echo "===== app.py ====="
          cat app.py || true
          echo "===== README.md ====="
          cat README.md || true
          echo "===== userservice.txt ====="
          cat userservice.txt || true

      # Step 4: Run GitLeaks on FULL repo (list all leaks)
      - name: Run GitLeaks (Full Repo Scan)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            zricethezav/gitleaks:latest \
            detect --source=/repo --no-git --verbose --exit-code 0