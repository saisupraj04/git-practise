name: Secret Scan Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Debug - show only app.py
      - name: Show app.py content
        run: |
          echo "===== app.py content ====="
          cat app.py

      # Step 3: Run GitLeaks ONLY on app.py
      - name: Run GitLeaks on app.py
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            zricethezav/gitleaks:latest \
            detect --source=app.py --no-git --verbose --exit-code 1